<!DOCTYPE HTML>
<html>
    <head>
        <title>Form Registrasi Event</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <div id="main_content">
            <div class="form_box">
                <div class="form_title">
                    FORMULIR PENGUNDURAN DIRI DARI KAMPUS
                </div>
                <div class="form_content">
                    <form>

                        <label class="form_label">NAMA</label>
                        <input type="text" name="first_name" class="form_textbox_short">
                        <div class="separator"></div>

                        <label class="form_label">NRP</label>
                        <input type="text" name="NRP" class="form_textbox_short">
                        <div class="separator"></div>

                        <label class="form_label">JURUSAN</label>
                        <input type="text" name="company" class="form_textbox">
                        <div class="separator"></div>

                        <label class="form_label">EMAIL</label>
                        <input type="text" name="email" class="form_textbox">
                        <div class="separator"></div>

                        <label class="form_label">NOMOR TELEPON</label>
                        <input type="text" name="phone_number" class="form_textbox_short">
                        <div class="separator"></div>

                        <label class="form_label">ALASAN</label>
                        <select name="subject" class="form_textbox">
                            <option value="1">Kurang biaya</option>
                            <option value="2">Jauh dari orang tua</option>
                            <option value="3">Dapet kuliah yang lebih bagus</option>
                            <option value="4">Aku Malas</option>
                            <option value="5">Tidak sesuai ekspetasi</option>
                            <option value="6">Aku gamau pindah udah nyaman</option>
                        </select>

                        <label class="form_label">CERITAKAN KELUHAN DAN SOLUSI</label>
                        <textarea name="keluhan" class="form_textarea"></textarea>
                        <div class="separator"></div>

                        <!-- Bagian bawah rata tengah -->
                        <div class="form_bottom">
                            <label>Apakah Kamu Yakin?</label>
                            <ul class="form_radio_horizontal">
                                <li>
                                    <input type="radio" name="is_existing" value="IYA" checked>
                                </li>
                                <li class="item_text">IYA</li>
                                <li>
                                    <input type="radio" name="is_existing" value="Ragu Ragu">
                                </li>
                                <li class="item_text">Ragu Ragu</li>
                                <li>
                                    <input type="radio" name="is_existing" value="Tidak">
                                </li>
                                <li class="item_text">Tidak</li>
                            </ul>
                            <input type="button" value="LAPOR" class="form_button_greenn">
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </body>
</html>
